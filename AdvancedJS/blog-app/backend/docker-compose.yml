services:
  nginx:
    image: nginx:alpine
    container_name: writeflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  api:
    build: .
    container_name: writeflow-api
    restart: unless-stopped
    expose:
      - "3000"
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: writeflow-db
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  seed:
    build: .
    container_name: writeflow-seed
    command: node src/seeds/seed.js
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017
    depends_on:
      mongo:
        condition: service_healthy
    profiles:
      - seed

volumes:
  mongo_data:
